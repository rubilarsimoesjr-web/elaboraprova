<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ElaboraProva – Corretor</title>
<style>
  :root {
    --navy:#1a2744; --gold:#c9a84c; --green:#2d7a4f;
    --red:#c0392b; --bg:#f5f4f0; --white:#fff;
    --text:#1a1a2e; --soft:#5a5a72; --border:#ddd8cc;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { background:var(--navy); color:var(--white); padding:0.9rem 1rem; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:1.1rem; font-weight:700; color:var(--gold); }
  header span { font-size:0.8rem; color:#a0aec0; }
  main { padding:1rem; max-width:480px; margin:0 auto; }
  .card { background:var(--white); border-radius:10px; box-shadow:0 2px 12px rgba(26,39,68,0.10); padding:1.2rem; margin-bottom:1rem; }
  .card h2 { font-size:0.95rem; font-weight:700; color:var(--navy); margin-bottom:0.8rem; padding-bottom:0.5rem; border-bottom:2px solid var(--gold); }
  .btn { display:inline-flex; align-items:center; gap:0.4rem; padding:0.65rem 1.2rem; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; width:100%; justify-content:center; margin-bottom:0.5rem; }
  .btn-primary { background:var(--navy); color:var(--white); }
  .btn-gold    { background:var(--gold); color:var(--navy); }
  .btn-green   { background:var(--green); color:var(--white); }
  .btn-outline { background:transparent; color:var(--navy); border:1.5px solid var(--navy); }
  .btn-red     { background:var(--red); color:var(--white); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-sm { padding:0.4rem 0.8rem; font-size:0.82rem; width:auto; margin-bottom:0; }
  .btn-row { display:flex; gap:0.5rem; }
  .nome-input { width:100%; padding:0.5rem 0.7rem; border:1.5px solid var(--border); border-radius:6px; font-size:0.9rem; margin-top:0.3rem; }
  .nome-input:focus { outline:none; border-color:var(--navy); }
  label { font-size:0.82rem; font-weight:600; color:var(--soft); display:block; margin-bottom:0.2rem; margin-top:0.6rem; }
  .conf-respostas { display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.6rem 0; }
  .resp-q { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .resp-q-num { font-size:0.65rem; font-weight:700; color:var(--soft); }
  .resp-letras { display:flex; gap:3px; }
  .resp-btn { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border); background:var(--white); font-size:0.75rem; font-weight:700; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .resp-btn.sel { background:var(--navy); color:var(--white); border-color:var(--navy); }
  .resultado-card { border:1.5px solid var(--border); border-radius:8px; padding:0.8rem; margin-bottom:0.6rem; background:var(--bg); }
  .resultado-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem; }
  .resultado-nome { font-weight:700; font-size:0.9rem; }
  .resultado-nota { font-size:1.2rem; font-weight:800; }
  .resultado-nota.ap  { color:var(--green); }
  .resultado-nota.rep { color:var(--red); }
  .resps-mini { display:flex; flex-wrap:wrap; gap:2px; margin-top:0.3rem; }
  .resp-mini { width:24px; height:24px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; }
  .resp-mini.ok   { background:#d1fae5; border-color:var(--green); color:var(--green); }
  .resp-mini.err  { background:#fee2e2; border-color:var(--red); color:var(--red); }
  .resp-mini.vazio{ color:#bbb; border-color:#ddd; }
  .stats { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:0.8rem; }
  .stat { background:var(--bg); border-radius:6px; padding:0.4rem 0.7rem; text-align:center; flex:1; min-width:60px; }
  .stat .n { font-size:1.3rem; font-weight:800; color:var(--navy); }
  .stat .l { font-size:0.68rem; color:var(--soft); text-transform:uppercase; }
  .info-box { background:#f0f4ff; border-radius:6px; padding:0.6rem 0.8rem; font-size:0.82rem; color:var(--navy); margin-bottom:0.6rem; }
  #toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--navy); color:var(--white); padding:0.6rem 1.2rem; border-radius:8px; font-size:0.85rem; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; max-width:90vw; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.ok  { border-left:4px solid var(--gold); }
  #toast.err { border-left:4px solid var(--red); }
</style>
</head>
<body>

<header>
  <h1>✏️ ElaboraProva – Corretor</h1>
  <span id="contador">0 cartões</span>
</header>

<main>

  <!-- INSERÇÃO DO CARTÃO -->
  <div class="card">
    <h2>📋 Registrar Cartão</h2>
    <div class="info-box">
      Leia o QR Code do cartão com o leitor USB ou com o app de câmera do celular e cole o código abaixo.
    </div>

    <label>🔐 Senha do QR Code <span style="font-weight:400; color:var(--soft);">(se a prova foi gerada com senha)</span></label>
    <input type="text" id="senhaQR" class="nome-input" placeholder="Ex: geo2025">

    <label>Código QR <span style="font-weight:400; color:var(--soft);">(cole o texto lido pelo leitor)</span></label>
    <input type="text" id="input-qr" class="nome-input" placeholder="EP|V:A|N:10|G:...|T:Turma|A:1">

    <label>Nome do aluno</label>
    <input type="text" id="input-nome" class="nome-input" placeholder="Nome completo">

    <div style="margin-top:0.8rem;">
      <button class="btn btn-gold" onclick="processarQR()">▶ Processar cartão</button>
    </div>
  </div>

  <!-- CONFIRMAÇÃO DAS RESPOSTAS -->
  <div class="card" id="card-confirmacao" style="display:none;">
    <h2>✅ Confirmar Respostas</h2>
    <div id="conf-info" style="font-size:0.82rem; color:var(--soft); margin-bottom:0.5rem;"></div>
    <div style="font-size:0.78rem; font-weight:600; color:var(--soft); margin-bottom:0.4rem;">
      Toque para corrigir respostas detectadas
    </div>
    <div id="conf-respostas" class="conf-respostas"></div>
    <div class="btn-row" style="margin-top:0.5rem;">
      <button class="btn btn-green" onclick="confirmarCartao()" style="flex:1">✅ Confirmar</button>
      <button class="btn btn-outline" onclick="descartarCartao()" style="flex:1">✕ Descartar</button>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div class="card" id="card-resultados" style="display:none;">
    <h2>📋 Cartões Corrigidos</h2>
    <div class="stats" id="resumo-stats"></div>
    <div id="lista-resultados"></div>
    <div style="margin-top:0.8rem;">
      <button class="btn btn-primary" onclick="exportarJSON()">💾 Exportar para o Desktop</button>
      <button class="btn btn-outline" onclick="limparTudo()">🗑️ Limpar tudo</button>
    </div>
  </div>

</main>
<div id="toast"></div>

<script>
let pendente = null;
let cartoesCorrigidos = [];

// ===== AES DECRYPT =====
async function aesDecrypt(b64url, senha) {
  try {
    const b64  = b64url.replace(/-/g,'+').replace(/_/g,'/');
    const buf  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = buf.slice(0, 16), iv = buf.slice(16, 28), ct = buf.slice(28);
    const enc  = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
      keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    return new TextDecoder().decode(await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct));
  } catch { return null; }
}

// ===== PARSE QR =====
async function parseQR(text) {
  try {
    const parts = {};
    text.split('|').forEach(p => { const i=p.indexOf(':'); if(i>0) parts[p.slice(0,i)]=p.slice(i+1); });
    if (!parts.V || !parts.G || !parts.N) return null;
    let gabStr = parts.G;
    if (parts.C === '1') {
      const senha = document.getElementById('senhaQR')?.value.trim() || '';
      if (!senha) { toast('QR cifrado — informe a senha', 'err'); return null; }
      gabStr = await aesDecrypt(parts.G, senha);
      if (!gabStr) { toast('Senha incorreta', 'err'); return null; }
    }
    return { variacao:parts.V, nq:parseInt(parts.N), gabarito:gabStr.split(''), turma:parts.T||'', aluno:parseInt(parts.A)||0 };
  } catch { return null; }
}

// ===== PROCESSAR QR =====
async function processarQR() {
  const qrText = document.getElementById('input-qr').value.trim();
  const nome   = document.getElementById('input-nome').value.trim();
  if (!qrText) { toast('Cole o código QR primeiro', 'err'); return; }
  const parsed = await parseQR(qrText);
  if (!parsed) { toast('Código QR inválido', 'err'); return; }
  // Respostas iniciam todas como '?' — usuário preenche
  const respostas = new Array(parsed.nq).fill('?');
  mostrarConfirmacao(parsed, respostas, nome);
}

// ===== CONFIRMAÇÃO =====
function mostrarConfirmacao(parsed, respostas, nome) {
  pendente = { parsed, respostas: [...respostas] };
  document.getElementById('conf-info').innerHTML =
    `Variação <strong>${parsed.variacao}</strong> · ${parsed.nq} questões · Aluno ${parsed.aluno}${parsed.turma?' · '+parsed.turma:''}`;
  const container = document.getElementById('conf-respostas');
  container.innerHTML = '';
  for (let i = 0; i < parsed.nq; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'resp-q';
    wrap.innerHTML = `<div class="resp-q-num">Q${i+1}</div>
      <div class="resp-letras">
        ${['A','B','C','D','?'].map(l => `
          <button class="resp-btn${respostas[i]===l?' sel':''}"
            onclick="selecionarResp(${i},'${l}',this)" data-q="${i}" data-l="${l}">
            ${l==='?'?'—':l}
          </button>`).join('')}
      </div>`;
    container.appendChild(wrap);
  }
  // Preenche nome se veio do campo
  if (nome) document.getElementById('input-nome').value = nome;
  document.getElementById('card-confirmacao').style.display = 'block';
  document.getElementById('card-confirmacao').scrollIntoView({ behavior:'smooth' });
}

function selecionarResp(qIdx, letra, btn) {
  document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(b => b.className = 'resp-btn');
  btn.className = 'resp-btn sel';
  if (pendente) pendente.respostas[qIdx] = letra;
}

function confirmarCartao() {
  if (!pendente) return;
  const nome = document.getElementById('input-nome').value.trim() || 'Sem nome';
  const { parsed, respostas } = pendente;
  let acertos = 0;
  const detalhes = respostas.map((resp, i) => {
    const gab = parsed.gabarito[i] || '?';
    const certa = resp !== '?' && resp === gab;
    if (certa) acertos++;
    return { q:i+1, resp, gab, certa };
  });
  const nota = parsed.nq > 0 ? ((acertos/parsed.nq)*10).toFixed(1) : '0.0';
  cartoesCorrigidos.push({ aluno:parsed.aluno, nome, variacao:parsed.variacao, turma:parsed.turma, acertos, total:parsed.nq, nota:parseFloat(nota), detalhes, ts:new Date().toISOString() });
  pendente = null;
  document.getElementById('card-confirmacao').style.display = 'none';
  document.getElementById('input-qr').value = '';
  document.getElementById('input-nome').value = '';
  document.getElementById('input-qr').focus();
  atualizarResultados();
  toast(`✅ ${nome}: ${acertos}/${parsed.nq} = ${nota}`, 'ok');
}

function descartarCartao() {
  pendente = null;
  document.getElementById('card-confirmacao').style.display = 'none';
}

// ===== RESULTADOS =====
function atualizarResultados() {
  const card = document.getElementById('card-resultados');
  if (!cartoesCorrigidos.length) { card.style.display='none'; return; }
  card.style.display = 'block';
  document.getElementById('contador').textContent = cartoesCorrigidos.length + ' cartão(ões)';
  const total = cartoesCorrigidos.length;
  const media = (cartoesCorrigidos.reduce((s,c)=>s+c.nota,0)/total).toFixed(1);
  const aprov = cartoesCorrigidos.filter(c=>c.nota>=7).length;
  document.getElementById('resumo-stats').innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Cartões</div></div>
    <div class="stat"><div class="n">${media}</div><div class="l">Média</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${aprov}</div><div class="l">≥7,0</div></div>
    <div class="stat"><div class="n" style="color:var(--red)">${total-aprov}</div><div class="l"><7,0</div></div>`;
  document.getElementById('lista-resultados').innerHTML = cartoesCorrigidos.map((c,idx)=>`
    <div class="resultado-card">
      <div class="resultado-header">
        <div>
          <div class="resultado-nome">${c.nome}</div>
          <div style="font-size:0.75rem;color:var(--soft);">Var.${c.variacao} · ${c.acertos}/${c.total}</div>
        </div>
        <div class="resultado-nota ${c.nota>=7?'ap':'rep'}">${c.nota.toFixed(1)}</div>
      </div>
      <div class="resps-mini">
        ${c.detalhes.map(d=>`
          <div class="resp-mini ${d.resp==='?'?'vazio':d.certa?'ok':'err'}">${d.resp==='?'?'—':d.resp}</div>`).join('')}
      </div>
      <div style="margin-top:0.3rem;display:flex;gap:0.3rem;justify-content:flex-end;">
        <button class="btn btn-outline btn-sm" onclick="removerCartao(${idx})">✕</button>
      </div>
    </div>`).join('');
}

function removerCartao(idx) {
  cartoesCorrigidos.splice(idx,1);
  atualizarResultados();
}

function limparTudo() {
  if (!confirm('Limpar todos os cartões?')) return;
  cartoesCorrigidos=[];
  atualizarResultados();
  document.getElementById('contador').textContent='0 cartões';
}

function exportarJSON() {
  if (!cartoesCorrigidos.length) { toast('Nenhum cartão para exportar','err'); return; }
  const dados = { versao:'1.0', exportado_em:new Date().toISOString(), total_cartoes:cartoesCorrigidos.length, cartoes:cartoesCorrigidos };
  const blob = new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`correcao_${cartoesCorrigidos[0]?.turma||'turma'}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('✅ JSON exportado!','ok');
}

function toast(msg,tipo='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+tipo;
  setTimeout(()=>t.className='',3000);
}
</script>
</body>
</html>
