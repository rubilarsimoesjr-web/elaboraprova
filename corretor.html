<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ElaboraProva – Corretor</title>
<style>
  :root {
    --navy:#1a2744; --gold:#c9a84c; --green:#2d7a4f;
    --red:#c0392b; --bg:#f5f4f0; --white:#fff;
    --text:#1a1a2e; --soft:#5a5a72; --border:#ddd8cc;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header { background:var(--navy); color:var(--white); padding:0.9rem 1rem; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:1.1rem; font-weight:700; color:var(--gold); }
  header span { font-size:0.8rem; color:#a0aec0; }

  main { padding:1rem; max-width:480px; margin:0 auto; }

  .card { background:var(--white); border-radius:10px; box-shadow:0 2px 12px rgba(26,39,68,0.10); padding:1.2rem; margin-bottom:1rem; }
  .card h2 { font-size:0.95rem; font-weight:700; color:var(--navy); margin-bottom:0.8rem; padding-bottom:0.5rem; border-bottom:2px solid var(--gold); }

  /* Câmera */
  #camera-wrap { position:relative; width:100%; background:#000; border-radius:8px; overflow:hidden; }
  #video { width:100%; display:block; max-height:70vw; object-fit:cover; }
  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #scan-canvas { display:none; }

  /* Guia de alinhamento */
  .guia-svg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

  /* Status */
  .status-bar { display:flex; align-items:center; gap:0.5rem; padding:0.5rem 0.7rem; border-radius:6px; font-size:0.82rem; font-weight:600; margin-bottom:0.8rem; background:#f0f4ff; color:var(--navy); }
  .status-bar.ok  { background:#d1fae5; color:var(--green); }
  .status-bar.err { background:#fee2e2; color:var(--red); }
  .status-bar.warn{ background:#fef3c7; color:#b45309; }
  .dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

  /* Botões */
  .btn { display:inline-flex; align-items:center; gap:0.4rem; padding:0.65rem 1.2rem; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; width:100%; justify-content:center; margin-bottom:0.5rem; }
  .btn-primary { background:var(--navy); color:var(--white); }
  .btn-gold    { background:var(--gold); color:var(--navy); }
  .btn-green   { background:var(--green); color:var(--white); }
  .btn-outline { background:transparent; color:var(--navy); border:1.5px solid var(--navy); }
  .btn-red     { background:var(--red); color:var(--white); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-sm { padding:0.4rem 0.8rem; font-size:0.82rem; width:auto; margin-bottom:0; }
  .btn-row { display:flex; gap:0.5rem; }

  /* Confirmação */
  .conf-respostas { display:flex; flex-wrap:wrap; gap:0.4rem; margin:0.5rem 0; }
  .resp-q { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .resp-q-num { font-size:0.65rem; font-weight:700; color:var(--soft); }
  .resp-letras { display:flex; gap:2px; }
  .resp-btn {
    width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border);
    background:var(--white); font-size:0.72rem; font-weight:700; color:var(--text);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .resp-btn.sel { background:var(--navy); color:var(--white); border-color:var(--navy); }
  .resp-btn.auto-ok { background:#d1fae5; border-color:var(--green); color:var(--green); }

  /* Resultado */
  .resultado-card { border:1.5px solid var(--border); border-radius:8px; padding:0.8rem; margin-bottom:0.6rem; background:var(--bg); }
  .resultado-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.4rem; }
  .resultado-nome { font-weight:700; font-size:0.9rem; }
  .resultado-nota { font-size:1.2rem; font-weight:800; }
  .resultado-nota.ap { color:var(--green); }
  .resultado-nota.rep { color:var(--red); }
  .resps-mini { display:flex; flex-wrap:wrap; gap:2px; margin-top:0.3rem; }
  .resp-mini { width:24px; height:24px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; }
  .resp-mini.ok  { background:#d1fae5; border-color:var(--green); color:var(--green); }
  .resp-mini.err { background:#fee2e2; border-color:var(--red); color:var(--red); }
  .resp-mini.vazio { color:#bbb; border-color:#ddd; }

  /* Resumo */
  .stats { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:0.8rem; }
  .stat { background:var(--bg); border-radius:6px; padding:0.4rem 0.7rem; text-align:center; flex:1; min-width:60px; }
  .stat .n { font-size:1.3rem; font-weight:800; color:var(--navy); }
  .stat .l { font-size:0.68rem; color:var(--soft); text-transform:uppercase; }

  .nome-input { width:100%; padding:0.4rem 0.6rem; border:1.5px solid var(--border); border-radius:6px; font-size:0.88rem; margin-top:0.3rem; }
  .nome-input:focus { outline:none; border-color:var(--navy); }

  #toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--navy); color:var(--white); padding:0.6rem 1.2rem; border-radius:8px; font-size:0.85rem; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; max-width:90vw; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.ok  { border-left:4px solid var(--gold); }
  #toast.err { border-left:4px solid var(--red); }

  .empty { text-align:center; padding:1.5rem; color:var(--soft); font-size:0.88rem; }

  /* Indicador de confiança */
  .confianca { font-size:0.75rem; margin-top:0.3rem; }
  .confianca.alta { color:var(--green); }
  .confianca.media { color:#b45309; }
  .confianca.baixa { color:var(--red); }
</style>
</head>
<body>

<header>
  <h1>📷 ElaboraProva – Corretor</h1>
  <span id="contador">0 cartões</span>
</header>

<main>

  <!-- CÂMERA -->
  <div class="card">
    <h2>📸 Escanear Cartão</h2>
    <div id="status-scan" class="status-bar">
      <div class="dot"></div> Câmera desligada
    </div>
    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <canvas id="scan-canvas"></canvas>
    </div>
    <div style="margin-top:0.8rem; display:flex; flex-direction:column; gap:0.4rem;">
      <button class="btn btn-primary" id="btn-camera" onclick="toggleCamera()">📷 Ligar Câmera</button>
      <button class="btn btn-gold" id="btn-capturar" onclick="capturarAgora()" style="display:none;">📸 Capturar agora</button>
      <button class="btn btn-outline" onclick="showManual()">✏️ Inserir manualmente</button>
    </div>
  </div>

  <!-- MANUAL -->
  <div class="card" id="card-manual" style="display:none;">
    <h2>✏️ Inserção Manual</h2>
    <div style="margin-bottom:0.6rem;">
      <label style="font-size:0.8rem;font-weight:600;color:var(--soft);">Código QR</label>
      <input type="text" id="manual-qr" class="nome-input" placeholder="EP|V:A|N:5|G:CBDAB|T:Turma|A:1">
    </div>
    <div style="margin-bottom:0.6rem;">
      <label style="font-size:0.8rem;font-weight:600;color:var(--soft);">Nome do aluno</label>
      <input type="text" id="manual-nome" class="nome-input" placeholder="Nome completo">
    </div>
    <div style="margin-bottom:0.6rem;">
      <label style="font-size:0.8rem;font-weight:600;color:var(--soft);">Respostas (ex: CBDAB)</label>
      <input type="text" id="manual-respostas" class="nome-input" placeholder="Uma letra por questão" maxlength="10" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()">
    </div>
    <button class="btn btn-gold" onclick="processarManual()">✅ Confirmar</button>
    <button class="btn btn-outline" onclick="document.getElementById('card-manual').style.display='none'">Cancelar</button>
  </div>

  <!-- CONFIRMAÇÃO -->
  <div class="card" id="card-confirmacao" style="display:none;">
    <h2>✅ Cartão Lido</h2>
    <div id="conf-info" style="font-size:0.8rem;color:var(--soft);margin-bottom:0.5rem;"></div>
    <div id="conf-confianca" class="confianca"></div>
    <div style="margin-bottom:0.5rem;">
      <label style="font-size:0.8rem;font-weight:600;color:var(--soft);">Nome do aluno</label>
      <input type="text" id="conf-nome" class="nome-input" placeholder="Digite o nome">
    </div>
    <div style="margin-bottom:0.6rem;">
      <div style="font-size:0.78rem;font-weight:700;color:var(--soft);margin-bottom:0.4rem;">
        Respostas detectadas — toque para corrigir
      </div>
      <div id="conf-respostas" class="conf-respostas"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="confirmarCartao()" style="flex:1">✅ Confirmar</button>
      <button class="btn btn-outline" onclick="descartarCartao()" style="flex:1">✕ Descartar</button>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div class="card" id="card-resultados" style="display:none;">
    <h2>📋 Cartões Corrigidos</h2>
    <div class="stats" id="resumo-stats"></div>
    <div id="lista-resultados"></div>
    <div style="margin-top:0.8rem;">
      <button class="btn btn-gold" onclick="exportarJSON()">💾 Exportar para o Desktop</button>
      <button class="btn btn-outline" onclick="limparTudo()">🗑️ Limpar tudo</button>
    </div>
  </div>

</main>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
// ===== ÁUDIO =====
let audioCtx = null;

// Inicializa o AudioContext no primeiro toque — obrigatório em mobile
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function beep(freq=880, dur=120, vol=0.3) {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur/1000);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + dur/1000);
  } catch(e) {}
}

function beepSucesso() {
  beep(880, 100, 0.3);
  setTimeout(() => beep(1100, 150, 0.3), 130);
}

function beepErro() {
  beep(300, 300, 0.3);
}

// ===== ESTADO =====
let stream = null;
let scanning = false;
let scanInterval = null;
let pendente = null;
let cartoesCorrigidos = [];
let ultimoQR = null;
let ultimoQRTime = 0;
let capturado = null; // imageData capturada para análise de bolinhas

const video      = document.getElementById('video');
const scanCanvas = document.getElementById('scan-canvas');
const overlay    = document.getElementById('overlay');
const scanCtx    = scanCanvas.getContext('2d', { willReadFrequently: true });
const ovCtx      = overlay.getContext('2d');

// ===== CÂMERA =====
async function toggleCamera() {
  initAudio();
  stream ? pararCamera() : await ligarCamera();
}

async function ligarCamera() {
  try {
    setStatus('Iniciando câmera...', '');
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('btn-camera').textContent = '⏹ Parar Câmera';
    document.getElementById('btn-capturar').style.display = 'flex';
    setStatus('Enquadre o cartão-resposta na tela', '');
    scanning = true;
    scanInterval = setInterval(scanFrame, 150);
    requestAnimationFrame(desenharGuia);
  } catch(e) {
    setStatus('Erro: ' + e.message, 'err');
  }
}

function pararCamera() {
  scanning = false;
  clearInterval(scanInterval);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  document.getElementById('btn-camera').textContent = '📷 Ligar Câmera';
  ovCtx.clearRect(0, 0, overlay.width, overlay.height);
  setStatus('Câmera desligada', '');
}

// ===== GUIA VISUAL =====
function desenharGuia() {
  if (!stream) return;
  requestAnimationFrame(desenharGuia);

  overlay.width  = overlay.offsetWidth;
  overlay.height = overlay.offsetHeight;
  const W = overlay.width, H = overlay.height;

  ovCtx.clearRect(0, 0, W, H);

  // Área alvo: 85% da largura, centralizada
  const mx = W * 0.075, my = H * 0.08;
  const rw = W * 0.85,  rh = H * 0.84;

  // Fundo escurecido fora da área
  ovCtx.fillStyle = 'rgba(0,0,0,0.35)';
  ovCtx.fillRect(0, 0, W, H);
  ovCtx.clearRect(mx, my, rw, rh);

  // Borda da área alvo
  ovCtx.strokeStyle = '#c9a84c';
  ovCtx.lineWidth   = 2;
  ovCtx.strokeRect(mx, my, rw, rh);

  // Cantos decorativos
  const cs = 18;
  ovCtx.strokeStyle = '#fff';
  ovCtx.lineWidth   = 3;
  [[mx,my],[mx+rw,my],[mx,my+rh],[mx+rw,my+rh]].forEach(([x,y]) => {
    const sx = x === mx ? 1 : -1;
    const sy = y === my ? 1 : -1;
    ovCtx.beginPath();
    ovCtx.moveTo(x + sx*cs, y); ovCtx.lineTo(x, y); ovCtx.lineTo(x, y + sy*cs);
    ovCtx.stroke();
  });

  // Texto de instrução
  ovCtx.fillStyle = 'rgba(0,0,0,0.6)';
  ovCtx.fillRect(mx, my + rh + 4, rw, 22);
  ovCtx.fillStyle = '#fff';
  ovCtx.font = '12px sans-serif';
  ovCtx.textAlign = 'center';
  ovCtx.fillText('Enquadre o cartão-resposta completo', mx + rw/2, my + rh + 18);
}

// ===== SCAN =====
function scanFrame() {
  if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) return;

  scanCanvas.width = W; scanCanvas.height = H;
  scanCtx.drawImage(video, 0, 0, W, H);
  const imageData = scanCtx.getImageData(0, 0, W, H);

  // Tenta leitura normal e invertida
  let qr = jsQR(imageData.data, W, H, { inversionAttempts:'dontInvert' });
  if (!qr) qr = jsQR(imageData.data, W, H, { inversionAttempts:'onlyInvert' });
  if (!qr) qr = jsQR(imageData.data, W, H, { inversionAttempts:'attemptBoth' });

  if (qr && qr.data.startsWith('EP|')) {
    const agora = Date.now();
    if (qr.data === ultimoQR && agora - ultimoQRTime < 3000) return;
    ultimoQR     = qr.data;
    ultimoQRTime = agora;

    const parsed = parseQR(qr.data);
    if (!parsed) { setStatus('QR inválido — formato incorreto', 'err'); beepErro(); return; }

    setStatus('✅ QR lido! Analisando bolinhas...', 'ok');
    beepSucesso();

    capturado = { imageData, W, H, qrLoc: qr.location };
    const respostas = detectarBolinhas(imageData, W, H, qr.location, parsed.nq);
    mostrarConfirmacao(parsed, respostas.letras, respostas.confianca);

  } else if (qr) {
    // QR detectado mas não é do ElaboraProva
    setStatus('QR detectado — não é um cartão ElaboraProva', 'warn');
  } else {
    setStatus('Enquadre o cartão-resposta na tela', '');
  }
}

// ===== CAPTURA MANUAL =====
function capturarAgora() {
  if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) {
    setStatus('Câmera não está ativa', 'err'); return;
  }
  const W = video.videoWidth, H = video.videoHeight;
  scanCanvas.width = W; scanCanvas.height = H;
  scanCtx.drawImage(video, 0, 0, W, H);
  const imageData = scanCtx.getImageData(0, 0, W, H);

  let qr = jsQR(imageData.data, W, H, { inversionAttempts:'attemptBoth' });

  if (qr) {
    setStatus('QR detectado: ' + qr.data.substring(0, 30) + '...', qr.data.startsWith('EP|') ? 'ok' : 'warn');
    if (qr.data.startsWith('EP|')) {
      const parsed = parseQR(qr.data);
      if (parsed) {
        ultimoQR = qr.data; ultimoQRTime = Date.now();
        beepSucesso();
        const respostas = detectarBolinhas(imageData, W, H, qr.location, parsed.nq);
        mostrarConfirmacao(parsed, respostas.letras, respostas.confianca);
      }
    }
  } else {
    setStatus('Nenhum QR detectado neste frame — tente novamente', 'warn');
  }
}

// ===== PARSE QR =====
function parseQR(text) {
  try {
    const parts = {};
    text.split('|').forEach(p => {
      const i = p.indexOf(':');
      if (i > 0) parts[p.slice(0,i)] = p.slice(i+1);
    });
    if (!parts.V || !parts.G || !parts.N) return null;
    return {
      variacao: parts.V,
      nq: parseInt(parts.N),
      gabarito: parts.G.split(''),
      turma: parts.T || '',
      aluno: parseInt(parts.A) || 0
    };
  } catch { return null; }
}

// ===== DETECÇÃO DE BOLINHAS =====
function detectarBolinhas(imageData, W, H, qrLoc, nq) {
  // Estratégia:
  // 1. Usa a posição do QR Code como referência para estimar a região do cartão
  // 2. O cartão tem estrutura conhecida: âncoras nos cantos, bolinhas em grid 2 colunas
  // 3. Para cada bolinha, amostra uma região circular e mede escuridão

  const letras    = [];
  const confianca = [];

  try {
    // Estima a região do cartão a partir do QR Code
    // O QR Code fica no canto superior direito do cartão
    const qrX = (qrLoc.topLeftCorner.x + qrLoc.topRightCorner.x) / 2;
    const qrY = (qrLoc.topLeftCorner.y + qrLoc.bottomLeftCorner.y) / 2;
    const qrW = Math.abs(qrLoc.topRightCorner.x - qrLoc.topLeftCorner.x);

    // Estima largura do cartão: QR ocupa ~20% da largura
    const cartaoW = qrW / 0.20;
    const cartaoX = qrX - cartaoW * 0.80; // QR está à direita
    const cartaoY = qrY - qrW * 0.5;      // QR está no topo

    // Altura estimada do cartão
    // Cabeçalho ~30%, bolinhas ~55%, âncoras ~15%
    const linhaH   = cartaoW * 0.12; // altura de cada linha de bolinhas
    const inicioY  = cartaoY + cartaoW * 0.35; // onde começam as bolinhas
    const colW     = cartaoW * 0.45; // largura de cada coluna
    const bolinhaR = linhaH * 0.30;  // raio de cada bolinha
    const metade   = Math.ceil(nq / 2);

    // Espaçamento entre letras A B C D
    const letraEsp = colW * 0.18;
    const letraIni = cartaoX + colW * 0.15;

    for (let i = 0; i < nq; i++) {
      const col   = i < metade ? 0 : 1;
      const linha = i < metade ? i : i - metade;
      const cx    = letraIni + col * colW;
      const cy    = inicioY + linha * linhaH;

      // Analisa cada letra A B C D
      const scores = [];
      for (let l = 0; l < 4; l++) {
        const bx = cx + l * letraEsp;
        const by = cy;
        scores.push({ letra:'ABCD'[l], score: escuridaoCirculo(imageData, W, H, bx, by, bolinhaR) });
      }

      // A bolinha marcada tem maior densidade de pixels escuros
      scores.sort((a,b) => b.score - a.score);
      const max   = scores[0].score;
      const seg   = scores[1].score;
      const diff  = max - seg;

      // Confiança baseada na diferença entre a mais escura e a segunda
      let conf = 'baixa';
      if (diff > 0.15 && max > 0.25) conf = 'alta';
      else if (diff > 0.08)           conf = 'media';

      letras.push(max > 0.20 ? scores[0].letra : '?');
      confianca.push(conf);
    }
  } catch(e) {
    console.warn('Erro na detecção:', e);
    for (let i = 0; i < nq; i++) { letras.push('?'); confianca.push('baixa'); }
  }

  return { letras, confianca };
}

function escuridaoCirculo(imageData, W, H, cx, cy, r) {
  // Mede a fração de pixels escuros numa região circular
  const data  = imageData.data;
  let escuros = 0, total = 0;
  const ri    = Math.ceil(r);

  for (let dy = -ri; dy <= ri; dy++) {
    for (let dx = -ri; dx <= ri; dx++) {
      if (dx*dx + dy*dy > r*r) continue;
      const px = Math.round(cx + dx);
      const py = Math.round(cy + dy);
      if (px < 0 || px >= W || py < 0 || py >= H) continue;
      const idx = (py * W + px) * 4;
      const lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
      if (lum < 128) escuros++;
      total++;
    }
  }
  return total > 0 ? escuros / total : 0;
}

// ===== CONFIRMAÇÃO =====
function mostrarConfirmacao(parsed, letras, confianca) {
  pendente = { parsed, letras: [...letras] };
  pararCamera();

  document.getElementById('conf-nome').value = '';
  document.getElementById('conf-info').innerHTML =
    `📋 Variação <strong>${parsed.variacao}</strong> · ${parsed.nq} questões · Aluno ${parsed.aluno}${parsed.turma ? ' · ' + parsed.turma : ''}`;

  // Indicador geral de confiança
  const baixas = confianca.filter(c => c === 'baixa').length;
  const confEl = document.getElementById('conf-confianca');
  if (baixas === 0) {
    confEl.className = 'confianca alta';
    confEl.textContent = '✅ Leitura com alta confiança — verifique e confirme';
  } else if (baixas <= 2) {
    confEl.className = 'confianca media';
    confEl.textContent = `⚠️ ${baixas} questão(ões) com leitura incerta — verifique`;
  } else {
    confEl.className = 'confianca baixa';
    confEl.textContent = `⚠️ Leitura incerta em ${baixas} questões — foto muito próxima ou torta`;
  }

  // Grid de botões por questão
  const container = document.getElementById('conf-respostas');
  container.innerHTML = '';

  for (let i = 0; i < parsed.nq; i++) {
    const respAtual = letras[i] || '?';
    const conf      = confianca[i];
    const gab       = parsed.gabarito[i] || '?';

    const wrap = document.createElement('div');
    wrap.className = 'resp-q';
    wrap.innerHTML = `<div class="resp-q-num">Q${i+1}</div>
      <div class="resp-letras">
        ${['A','B','C','D','?'].map(l => {
          const isSel  = l === respAtual;
          const isConf = isSel && conf !== 'baixa';
          let cls = 'resp-btn';
          if (isSel && isConf) cls += ' auto-ok';
          else if (isSel)      cls += ' sel';
          return `<button class="${cls}" onclick="selecionarResp(${i},'${l}',this)"
            data-q="${i}" data-l="${l}">${l === '?' ? '—' : l}</button>`;
        }).join('')}
      </div>`;
    container.appendChild(wrap);
  }

  document.getElementById('card-confirmacao').style.display = 'block';
  document.getElementById('card-confirmacao').scrollIntoView({ behavior:'smooth' });
}

function selecionarResp(qIdx, letra, btn) {
  document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(b => {
    b.className = 'resp-btn';
  });
  btn.className = 'resp-btn sel';
  if (pendente) pendente.letras[qIdx] = letra;
}

function confirmarCartao() {
  if (!pendente) return;
  const nome = document.getElementById('conf-nome').value.trim() || 'Sem nome';
  const { parsed, letras } = pendente;

  let acertos = 0;
  const detalhes = letras.map((resp, i) => {
    const gab   = parsed.gabarito[i] || '?';
    const certa = resp !== '?' && resp === gab;
    if (certa) acertos++;
    return { q:i+1, resp, gab, certa };
  });

  const nota = parsed.nq > 0 ? ((acertos / parsed.nq) * 10).toFixed(1) : '0.0';

  cartoesCorrigidos.push({
    aluno: parsed.aluno, nome,
    variacao: parsed.variacao, turma: parsed.turma,
    acertos, total: parsed.nq,
    nota: parseFloat(nota), detalhes,
    ts: new Date().toISOString()
  });

  pendente = null;
  document.getElementById('card-confirmacao').style.display = 'none';
  atualizarResultados();
  toast(`✅ ${nome}: ${acertos}/${parsed.nq} = ${nota}`, 'ok');
  setTimeout(() => ligarCamera(), 800);
}

function descartarCartao() {
  pendente = null;
  document.getElementById('card-confirmacao').style.display = 'none';
  ligarCamera();
}

// ===== MANUAL =====
function showManual() {
  initAudio();
  document.getElementById('card-manual').style.display = 'block';
  document.getElementById('card-manual').scrollIntoView({ behavior:'smooth' });
}

function processarManual() {
  const qrText    = document.getElementById('manual-qr').value.trim();
  const nome      = document.getElementById('manual-nome').value.trim() || 'Sem nome';
  const respStr   = document.getElementById('manual-respostas').value.trim().toUpperCase();
  const parsed    = parseQR(qrText);
  if (!parsed) { toast('Código QR inválido', 'err'); return; }
  const letras    = respStr.split('').slice(0, parsed.nq);
  while (letras.length < parsed.nq) letras.push('?');
  const confianca = letras.map(() => 'alta');
  document.getElementById('card-manual').style.display = 'none';
  mostrarConfirmacao(parsed, letras, confianca);
  document.getElementById('conf-nome').value = nome;
}

// ===== RESULTADOS =====
function atualizarResultados() {
  const card = document.getElementById('card-resultados');
  if (!cartoesCorrigidos.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('contador').textContent = cartoesCorrigidos.length + ' cartão(ões)';

  const total     = cartoesCorrigidos.length;
  const media     = (cartoesCorrigidos.reduce((s,c) => s+c.nota, 0) / total).toFixed(1);
  const aprovados = cartoesCorrigidos.filter(c => c.nota >= 7).length;

  document.getElementById('resumo-stats').innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Cartões</div></div>
    <div class="stat"><div class="n">${media}</div><div class="l">Média</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${aprovados}</div><div class="l">≥7,0</div></div>
    <div class="stat"><div class="n" style="color:var(--red)">${total-aprovados}</div><div class="l"><7,0</div></div>
  `;

  document.getElementById('lista-resultados').innerHTML = cartoesCorrigidos.map((c,idx) => `
    <div class="resultado-card">
      <div class="resultado-header">
        <div>
          <div class="resultado-nome">${c.nome}</div>
          <div style="font-size:0.75rem;color:var(--soft);">Var.${c.variacao} · ${c.acertos}/${c.total}</div>
        </div>
        <div class="resultado-nota ${c.nota>=7?'ap':'rep'}">${c.nota.toFixed(1)}</div>
      </div>
      <div class="resps-mini">
        ${c.detalhes.map(d => `
          <div class="resp-mini ${d.resp==='?'?'vazio':d.certa?'ok':'err'}" title="Q${d.q}:${d.resp}/${d.gab}">
            ${d.resp==='?'?'—':d.resp}
          </div>`).join('')}
      </div>
      <div style="margin-top:0.4rem;display:flex;gap:0.4rem;justify-content:flex-end;">
        <button class="btn btn-outline btn-sm" onclick="editarCartao(${idx})">✏️</button>
        <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:var(--red);" onclick="removerCartao(${idx})">✕</button>
      </div>
    </div>`).join('');
}

function removerCartao(idx) {
  cartoesCorrigidos.splice(idx, 1);
  atualizarResultados();
}

function editarCartao(idx) {
  const c      = cartoesCorrigidos[idx];
  const qrText = `EP|V:${c.variacao}|N:${c.total}|G:${c.detalhes.map(d=>d.gab).join('')}|T:${c.turma}|A:${c.aluno}`;
  const letras = c.detalhes.map(d => d.resp);
  const confianca = letras.map(() => 'alta');
  pendente = {
    parsed: { variacao:c.variacao, nq:c.total, gabarito:c.detalhes.map(d=>d.gab), turma:c.turma, aluno:c.aluno },
    letras
  };
  cartoesCorrigidos.splice(idx, 1);
  atualizarResultados();
  mostrarConfirmacao(pendente.parsed, letras, confianca);
  document.getElementById('conf-nome').value = c.nome;
}

// ===== EXPORTAR =====
function exportarJSON() {
  if (!cartoesCorrigidos.length) { toast('Nenhum cartão para exportar', 'err'); return; }
  const dados = {
    versao:'1.0',
    exportado_em: new Date().toISOString(),
    total_cartoes: cartoesCorrigidos.length,
    cartoes: cartoesCorrigidos
  };
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const turma = cartoesCorrigidos[0]?.turma || 'turma';
  a.href     = url;
  a.download = `correcao_${turma}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ JSON exportado!', 'ok');
}

function limparTudo() {
  if (!confirm('Limpar todos os cartões?')) return;
  cartoesCorrigidos = [];
  atualizarResultados();
  document.getElementById('contador').textContent = '0 cartões';
}

// ===== UTILITÁRIOS =====
function setStatus(msg, tipo) {
  const el = document.getElementById('status-scan');
  el.className = 'status-bar' + (tipo ? ' '+tipo : '');
  el.innerHTML = `<div class="dot"></div> ${msg}`;
}

function toast(msg, tipo='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + tipo;
  setTimeout(() => t.className = '', 3000);
}

window.addEventListener('resize', () => {
  overlay.width  = overlay.offsetWidth;
  overlay.height = overlay.offsetHeight;
});
</script>
</body>
</html>
